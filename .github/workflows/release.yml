name: "release"
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@4.4.0
        id: release
        with:
          config-file: .github/config/release-please-config.json
          manifest-file: .github/config/release-please-manifest.json

  update-docs:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@6.0.2
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - name: "Generate Documentation"
        uses: devcontainers/action@1.4.3
        with:
          generate-docs: "true"
          base-path-to-features: "./src"
          features-namespace: devcontainer-env/features
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Commit Documentation"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/**/README.md
          git diff --cached --quiet || git commit -m "docs: update auto-generated documentation"
          git push

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@6.0.2

      - name: "Publish Features"
        uses: devcontainers/action@1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          features-namespace: devcontainer-env/features
          disable-repo-tagging: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
